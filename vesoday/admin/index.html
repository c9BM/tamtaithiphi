<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quản Lý Số Visa Random</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Roboto', sans-serif;
            background: #0f0c29;
            color: white;
            min-height: 100vh;
            padding-bottom: 80px;
        }
        
        header {
            background: linear-gradient(90deg, #1a1a1a, #2c2c2c);
            padding: 15px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 2px solid #ffd700;
        }
        
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .visa-title {
            font-size: 22px;
            font-weight: 700;
            color: #ffd700;
        }
        
        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 15px;
        }
        
        .card {
            background: #1e1e2e;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
        
        .number-big {
            font-size: 42px;
            font-weight: 700;
            text-align: center;
            color: #ffd700;
            margin: 10px 0;
            letter-spacing: 6px;
        }
        
        .meta {
            font-size: 13px;
            opacity: 0.7;
            display: flex;
            justify-content: space-between;
        }
        
        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin: 8px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .btn-primary { background: #ffd700; color: #1a1a1a; }
        .btn-success { background: #00cc66; color: white; }
        .btn-danger { background: #ff4444; color: white; }
        .btn-warning { background: #ffaa00; color: white; }
        
        .list-item {
            background: #25253a;
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .modal-content {
            background: #1e1e2e;
            width: 90%;
            max-width: 420px;
            border-radius: 20px;
            padding: 20px;
        }
        
        input, select {
            width: 100%;
            padding: 14px;
            background: #2a2a3a;
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            margin: 10px 0;
        }
        
        .fab {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            background: #ffd700;
            color: #1a1a1a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: 0 5px 20px rgba(255,215,0,0.5);
            z-index: 900;
        }
        
        .empty {
            text-align: center;
            padding: 40px 20px;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <div class="visa-title">VISA RANDOM</div>
            <div><i class="fas fa-database"></i> CRUD</div>
        </div>
    </header>

    <div class="container">
        <!-- Thống kê -->
        <div class="card">
            <div style="display: flex; justify-content: space-around; text-align: center;">
                <div>
                    <div id="total-count" style="font-size: 28px; font-weight: 700; color: #ffd700;">0</div>
                    <div style="font-size: 13px;">Tổng số</div>
                </div>
                <div>
                    <div id="today-count" style="font-size: 28px; font-weight: 700;">0</div>
                    <div style="font-size: 13px;">Hôm nay</div>
                </div>
            </div>
        </div>

        <!-- Danh sách -->
        <h2 style="margin: 20px 0 10px; font-size: 18px;">📋 Danh sách số đã lưu</h2>
        <div id="list-container"></div>
    </div>

    <!-- Nút thêm -->
    <div class="fab" onclick="showCreateModal()">
        <i class="fas fa-plus"></i>
    </div>

    <!-- Modal -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <h3 id="modal-title">Thêm số mới</h3>
            
            <input type="number" id="modal-number" placeholder="Nhập số (1-200)" min="1" max="200">
            <input type="text" id="modal-note" placeholder="Ghi chú (tùy chọn)">
            
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn" style="background:#666;" onclick="closeModal()">Hủy</button>
                <button class="btn btn-success" id="modal-save-btn" onclick="saveEntry()">Lưu</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            databaseURL: "https://findhome777-default-rtdb.firebaseio.com"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const ref = db.ref('visa_random_numbers');

        let currentEditKey = null;

        function renderList(snapshot) {
            const container = document.getElementById('list-container');
            container.innerHTML = '';
            
            let total = 0;
            let today = 0;
            const todayStr = new Date().toISOString().split('T')[0];
            
            if (!snapshot || !snapshot.val()) {
                container.innerHTML = `<div class="empty"><i class="fas fa-inbox" style="font-size:48px;"></i><p>Chưa có dữ liệu</p></div>`;
                document.getElementById('total-count').textContent = '0';
                return;
            }
            
            const data = snapshot.val();
            const entries = Object.entries(data).sort((a,b) => b[1].timestamp - a[1].timestamp);
            
            entries.forEach(([key, value]) => {
                total++;
                const date = new Date(value.timestamp);
                const dateStr = date.toISOString().split('T')[0];
                if (dateStr === todayStr) today++;
                
                const div = document.createElement('div');
                div.className = 'list-item';
                div.innerHTML = `
                    <div>
                        <div style="font-size: 26px; font-weight: 700; color:#ffd700;">${String(value.number).padStart(3, '0')}</div>
                        <div style="font-size: 13px; opacity: 0.7;">${date.toLocaleString('vi-VN')}</div>
                        ${value.note ? `<div style="font-size:13px; margin-top:4px;">📝 ${value.note}</div>` : ''}
                    </div>
                    <div style="text-align:right;">
                        <button onclick="editEntry('${key}', ${value.number}, '${value.note || ''}')" style="background:none; border:none; color:#ffd700; font-size:18px; margin-right:8px;">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button onclick="deleteEntry('${key}')" style="background:none; border:none; color:#ff4444; font-size:18px;">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                `;
                container.appendChild(div);
            });
            
            document.getElementById('total-count').textContent = total;
            document.getElementById('today-count').textContent = today;
        }

        // Create
        function showCreateModal() {
            currentEditKey = null;
            document.getElementById('modal-title').textContent = 'Thêm số mới';
            document.getElementById('modal-number').value = Math.floor(Math.random() * 200) + 1;
            document.getElementById('modal-note').value = '';
            document.getElementById('modal').style.display = 'flex';
        }

        // Edit
        function editEntry(key, number, note) {
            currentEditKey = key;
            document.getElementById('modal-title').textContent = 'Chỉnh sửa';
            document.getElementById('modal-number').value = number;
            document.getElementById('modal-note').value = note || '';
            document.getElementById('modal').style.display = 'flex';
        }

        function saveEntry() {
            const number = parseInt(document.getElementById('modal-number').value);
            const note = document.getElementById('modal-note').value.trim();
            
            if (!number || number < 1 || number > 200) {
                alert("Số phải nằm trong khoảng 1 - 200!");
                return;
            }
            
            const data = {
                number: number,
                timestamp: Date.now(),
                note: note
            };
            
            if (currentEditKey) {
                // Update
                ref.child(currentEditKey).update(data)
                    .then(() => { closeModal(); alert("Cập nhật thành công!"); });
            } else {
                // Create
                ref.push(data)
                    .then(() => { closeModal(); alert("Thêm thành công!"); });
            }
        }

        function deleteEntry(key) {
            if (confirm("Bạn có chắc muốn xóa số này?")) {
                ref.child(key).remove()
                    .then(() => alert("Đã xóa!"));
            }
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        // Real-time listener
        window.onload = function() {
            ref.on('value', renderList);
        };
    </script>
</body>
</html>
