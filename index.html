<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lá Số Tử Vi 2025 - Tải PDF Miễn Phí</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Roboto:wght@400;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #e0e0ff;
            font-family: 'Roboto', sans-serif;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        #particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .particle {
            position: absolute;
            background: rgba(0, 255, 255, 0.6);
            border-radius: 50%;
            box-shadow: 0 0 15px cyan;
            animation: float 12s infinite linear;
        }
        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 0.7; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }
        header {
            text-align: center;
            padding: 50px 20px;
            background: rgba(0, 0, 0, 0.5);
            border-bottom: 3px solid cyan;
        }
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.5em;
            text-shadow: 0 0 20px cyan, 0 0 40px magenta;
            animation: neon 2s infinite alternate;
        }
        @keyframes neon { from { text-shadow: 0 0 10px cyan; } to { text-shadow: 0 0 30px cyan, 0 0 50px magenta; } }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.4);
            backdrop-filter: blur(10px);
        }
        section { margin-bottom: 40px; padding: 25px; border: 1px solid rgba(0, 255, 255, 0.5); border-radius: 12px; background: rgba(0, 0, 0, 0.3); }
        h2 { color: cyan; text-shadow: 0 0 10px cyan; margin-bottom: 15px; }

        .lookup-form {
            text-align: center;
            padding: 30px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 15px;
        }
        input, select {
            padding: 12px;
            margin: 8px;
            width: 130px;
            border: 2px solid cyan;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            border-radius: 8px;
            font-size: 1.05em;
        }
        button {
            margin: 20px 10px;
            padding: 14px 32px;
            background: linear-gradient(45deg, cyan, magenta);
            border: none;
            color: black;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.6);
            transition: all 0.3s;
        }
        button:hover { transform: scale(1.08); box-shadow: 0 0 30px magenta; }

        #result { margin-top: 20px; padding: 20px; border-radius: 10px; background: rgba(0, 0, 0, 0.6); min-height: 80px; display: none; animation: glow 1.5s infinite alternate; }
        @keyframes glow { from { box-shadow: 0 0 10px cyan; } to { box-shadow: 0 0 30px magenta; } }

        .tab {
            overflow: hidden;
            border: 1px solid rgba(0,255,255,0.5);
            border-radius: 10px 10px 0 0;
            background: rgba(0,0,0,0.4);
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }
        .tab button {
            background: transparent;
            border: none;
            outline: none;
            cursor: pointer;
            padding: 15px 25px;
            color: #ccc;
            flex: 1;
            min-width: 180px;
            font-size: 1.1em;
        }
        .tab button:hover { background: rgba(255,255,255,0.1); }
        .tab button.active {
            background: linear-gradient(45deg, cyan, magenta);
            color: black;
            font-weight: bold;
        }
        .tabcontent { display: none; padding: 25px; border: 1px solid rgba(0,255,255,0.5); border-top: none; border-radius: 0 0 10px 10px; }
        .tabcontent.active { display: block; }

        #tuvi-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            max-width: 950px;
            margin: 30px auto;
        }
        .cung {
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid cyan;
            border-radius: 12px;
            padding: 18px;
            text-align: center;
            transition: 0.3s;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.4);
        }
        .cung:hover { transform: scale(1.05); box-shadow: 0 0 30px magenta; }
        .cung h3 { color: gold; margin: 0 0 8px 0; font-size: 1.25em; }
        .cung .tinh { color: #ff6b6b; font-weight: bold; font-size: 1em; }
        .cung.menh { border-color: gold; box-shadow: 0 0 25px gold; }

        footer { text-align: center; padding: 25px; color: #aaa; font-size: 0.95em; }
        @media (max-width: 768px) {
            #tuvi-grid { grid-template-columns: repeat(2, 1fr); }
            h1 { font-size: 2.6em; }
        }
    </style>
    <script src="https://html2pdf.js.org/html2pdf.bundle.min.js"></script>
</head>
<body>
    <div id="particles"></div>

    <header>
        <h1>LÁ SỐ TỬ VI</h1>
        <p>Blockchain Phong Thủy 2025 - Tải PDF Miễn Phí</p>
    </header>

    <div class="container">
        <section>
            <h2>🔮 Nhập Thông Tin Xem Lá Số</h2>
            <div class="lookup-form">
                <input type="number" id="day" placeholder="Ngày" min="1" max="31">
                <input type="number" id="month" placeholder="Tháng" min="1" max="12">
                <input type="number" id="year" placeholder="Năm" min="1900" max="2025">
                <select id="gender">
                    <option value="nam">Nam</option>
                    <option value="nu">Nữ</option>
                </select>
                <select id="hour">
                    <option value="0">Tý (23h-1h)</option>
                    <option value="1">Sửu</option>
                    <option value="2">Dần</option>
                    <option value="3">Mão</option>
                    <option value="4">Thìn</option>
                    <option value="5">Tỵ</option>
                    <option value="6">Ngọ</option>
                    <option value="7">Mùi</option>
                    <option value="8">Thân</option>
                    <option value="9">Dậu</option>
                    <option value="10">Tuất</option>
                    <option value="11">Hợi</option>
                </select>
                <br>
                <button onclick="generateTuVi()">XEM LÁ SỐ</button>
                <button onclick="downloadPDF()" style="background: linear-gradient(45deg, gold, orange);">TẢI PDF</button>
                <div id="result"></div>
            </div>
        </section>

        <div class="tab">
            <button class="tablinks active" onclick="openTab(event, 'LaSo')">Lá Số</button>
            <button class="tablinks" onclick="openTab(event, 'LuanGiai')">Luận Giải Tam Tai &amp; Thị Phi</button>
        </div>

        <div id="LaSo" class="tabcontent active">
            <h2>Lá Số Tử Vi Của Bạn (2025)</h2>
            <div id="tuvi-grid"></div>
            <div id="tuviketqua" style="text-align:center; margin-top:25px; font-size:1.1em;"></div>
        </div>

        <div id="LuanGiai" class="tabcontent">
            <h2>🔥 Luận Giải Tam Tai & Thị Phi 2025</h2>
            <div id="tamtai-content"></div>
        </div>
    </div>

    <!-- PDF Content -->
    <div id="pdf-content" style="display:none; background:white; color:black; padding:40px; max-width:800px; margin:20px auto; border-radius:15px;">
        <h1 style="text-align:center; color:#302b63;">LÁ SỐ TỬ VI 2025</h1>
        <p id="pdf-info" style="text-align:center; font-size:1.15em;"></p>
        <div id="pdf-grid" style="display:grid; grid-template-columns:repeat(4,1fr); gap:15px; margin:30px 0;"></div>
        <div id="pdf-ketqua" style="text-align:center; margin:20px 0;"></div>
        <div id="pdf-tamtai" style="margin-top:40px; padding:20px; border-top:2px solid #302b63;">
            <h2 style="color:#302b63;">Luận Giải Tam Tai & Thị Phi</h2>
            <div id="pdf-tamtai-text"></div>
        </div>
        <p style="text-align:center; color:#666; margin-top:40px;">© 2025 Tử Vi Blockchain</p>
    </div>

    <footer>© 2025 Tử Vi Blockchain - Dữ liệu được mã hóa trên chuỗi khối.</footer>

    <script>
        // Particles
        const pContainer = document.getElementById('particles');
        for (let i = 0; i < 60; i++) {
            const p = document.createElement('div');
            p.classList.add('particle');
            p.style.width = `${Math.random() * 15 + 5}px`;
            p.style.height = p.style.width;
            p.style.left = `${Math.random() * 100}vw`;
            p.style.animationDelay = `${Math.random() * 12}s`;
            pContainer.appendChild(p);
        }

        const can = ["Canh","Tân","Nhâm","Quý","Giáp","Ất","Bính","Đinh","Mậu","Kỷ"];
        const chi = ["Thân","Dậu","Tuất","Hợi","Tý","Sửu","Dần","Mão","Thìn","Tỵ","Ngọ","Mùi"];
        const gioChi = ["Tý","Sửu","Dần","Mão","Thìn","Tỵ","Ngọ","Mùi","Thân","Dậu","Tuất","Hợi"];
        const cungArr = ["Mệnh","Phụ Mẫu","Phúc Đức","Điền Trạch","Quan Lộc","Nô Bộc","Thiên Di","Tật Ách","Tài Bạch","Tử Tức","Phu Thê","Huynh Đệ"];

        const tamtai2025 = {
            "Hợi": {group:"Hợi-Mão-Mùi", warn:"🚨 PHẠM TAM TAI", advice:"Năm 2025 Ất Tỵ (Hỏa) khắc Thủy nhóm Hợi-Mão-Mùi.<br>⚠️ Dễ thị phi, tiểu nhân, kiện tụng.<br>💡 Khắc phục: Giữ miệng, làm thiện, đeo mắt hổ hoặc trầm hương."},
            "Mão": {group:"Hợi-Mão-Mùi", warn:"🚨 PHẠM TAM TAI", advice:"Năm 2025 Ất Tỵ (Hỏa) khắc Thủy nhóm Hợi-Mão-Mùi.<br>⚠️ Dễ thị phi, tiểu nhân, kiện tụng.<br>💡 Khắc phục: Giữ miệng, làm thiện, đeo mắt hổ hoặc trầm hương."},
            "Mùi": {group:"Hợi-Mão-Mùi", warn:"🚨 PHẠM TAM TAI", advice:"Năm 2025 Ất Tỵ (Hỏa) khắc Thủy nhóm Hợi-Mão-Mùi.<br>⚠️ Dễ thị phi, tiểu nhân, kiện tụng.<br>💡 Khắc phục: Giữ miệng, làm thiện, đeo mắt hổ hoặc trầm hương."},
            "default": {warn:"✅ KHÔNG PHẠM TAM TAI", advice:"Năm 2025 Ất Tỵ hợp hoặc bình hòa với tuổi bạn.<br>🎉 Dễ được quý nhân phù trợ, thuận lợi làm ăn, mở rộng."}
        };

        function getCanChi(y) { return `${can[y % 10]} ${chi[y % 12]}`; }

        function anTuVi(lunarMonth, hour) {
            return (lunarMonth + hour + 2) % 12;
        }

        function generateTuVi() {
            const d = parseInt(document.getElementById('day').value);
            const m = parseInt(document.getElementById('month').value);
            const y = parseInt(document.getElementById('year').value);
            const g = document.getElementById('gender').value;
            const h = parseInt(document.getElementById('hour').value);

            if (!d || !m || !y) return alert("⚠️ Vui lòng nhập đầy đủ ngày tháng năm!");

            const canchi = getCanChi(y);
            const chiYear = chi[y % 12];
            const gio = gioChi[h];
            const tamtai = tamtai2025[chiYear] || tamtai2025.default;

            const lunarMonth = m; // Có thể cải tiến sau bằng cách convert âm lịch
            const tuViPos = anTuVi(lunarMonth, h);

            const grid = document.getElementById('tuvi-grid');
            grid.innerHTML = "";
            const pdfGrid = document.getElementById('pdf-grid');
            pdfGrid.innerHTML = "";

            cungArr.forEach((cungName, i) => {
                let tinh = "Không";
                let extraClass = (i === tuViPos) ? "menh" : "";

                if (i === tuViPos) tinh = "Tử Vi";
                else if (i === (tuViPos + 6) % 12) tinh = "Thiên Phủ";
                else if (i === (tuViPos + 3) % 12) tinh = "Thái Dương";
                else if (i === (tuViPos + 9) % 12) tinh = "Thái Âm";
                else if (i === (tuViPos + 2) % 12) tinh = "Thiên Đồng";
                else if (i === (tuViPos + 4) % 12) tinh = "Vũ Khúc";
                else tinh = ["Thiên Cơ","Liêm Trinh","Cự Môn","Thiên Tướng","Thất Sát","Phá Quân","Tham Lang","Thiên Lương"][(i + tuViPos) % 8];

                const div = document.createElement('div');
                div.className = `cung ${extraClass}`;
                div.innerHTML = `<h3>${cungName}</h3><div class="tinh">${tinh}</div>`;
                grid.appendChild(div);

                pdfGrid.appendChild(div.cloneNode(true));
            });

            const info = `${d}/${m}/${y} - ${gio} - ${g === "nam" ? "Dương Nam" : "Âm Nữ"}`;

            document.getElementById('tuviketqua').innerHTML = `
                <p><strong>Tuổi:</strong> ${canchi} | <strong>Giờ sinh:</strong> ${gio}</p>
                <p><strong>Tam Tai 2025:</strong> ${tamtai.warn}</p>
                <p>💫 <strong>Mệnh:</strong> Tử Vi tọa thủ - Quý nhân phù trợ, sự nghiệp có tiềm năng thăng tiến.</p>
            `;

            document.getElementById('tamtai-content').innerHTML = `
                <p><strong>Nhóm:</strong> ${tamtai.group || "Không thuộc Tam Tai"}</p>
                <p style="font-size:1.2em;margin:20px 0;">${tamtai.advice}</p>
            `;

            // PDF data
            document.getElementById('pdf-info').innerText = info;
            document.getElementById('pdf-ketqua').innerHTML = document.getElementById('tuviketqua').innerHTML;
            document.getElementById('pdf-tamtai-text').innerHTML = document.getElementById('tamtai-content').innerHTML;

            document.getElementById('result').style.display = "block";
            document.getElementById('result').innerHTML = "✅ Lá số đã được lập theo quy tắc Tử Vi thực tế hơn. Nhấn TẢI PDF để lưu.";
        }

        function openTab(evt, tabName) {
            document.querySelectorAll(".tabcontent").forEach(el => el.classList.remove("active"));
            document.querySelectorAll(".tablinks").forEach(el => el.classList.remove("active"));
            document.getElementById(tabName).classList.add("active");
            evt.currentTarget.classList.add("active");
        }

        function downloadPDF() {
            if (!document.getElementById('pdf-info').innerText) {
                return alert("⚠️ Vui lòng xem lá số trước khi tải PDF!");
            }
            const opt = {
                margin: 0.5,
                filename: `La_So_Tu_Vi_${new Date().getFullYear()}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(document.getElementById('pdf-content')).save();
        }
    </script>
</body>
</html>
